<style>

  --blue:#1a5fa8;--blue-dark:#134a85;--blue-light:#e8f1fb;

html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f3f5;color:#343a40;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
#app{height:100%}
.shell{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:#fff;overflow:hidden}
.header{background:var(--blue);color:#fff;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-icon{font-size:26px;line-height:1}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 0}
.nav{display:flex;background:#fff;border-top:1px solid var(--gray-200);padding-bottom:env(safe-area-inset-bottom);flex-shrink:0}
.nb{flex:1;border:none;background:transparent;padding:8px 2px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gray-600);font-size:10px;font-weight:500;cursor:pointer;border-top:2px solid transparent;-webkit-tap-highlight-color:transparent}
.nb svg{width:22px;height:22px;stroke-width:1.8}
.nb.active{color:var(--blue);border-top-color:var(--blue)}

.btn-success{background:var(--green);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--gray-300);color:var(--gray-800)}

.qty-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gray-100)}

.li-sub{font-size:12px;color:var(--gray-600);margin-top:2px}
.mitem{padding:10px 0;border-bottom:1px solid var(--gray-100)}

.mtop{display:flex;align-items:center;justify-content:space-between;gap:6px}

.mdetail{font-size:12px;color:var(--gray-600);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.btn-del{border:none;background:transparent;cursor:pointer;font-size:16px;padding:2px 4px;border-radius:6px;-webkit-tap-highlight-color:transparent;opacity:.7}
.btn-del:active{opacity:1;background:var(--red-light)}
.empty{text-align:center;padding:32px 16px;color:var(--gray-600);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:8px;opacity:.4}
.toast{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(8px);background:#343a40;color:#fff;border-radius:var(--r-sm);padding:9px 20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 40px)}

.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:24px;color:var(--gray-600);font-size:14px}
.spinner{width:18px;height:18px;border:2px solid var(--gray-300);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}

function exportCSV(){
  const saidas=movimentos.filter(m=>m.tipo==='saida'),rets=movimentos.filter(m=>m.tipo==='retorno')
  const usP=saidas.reduce((a,m)=>a+m.qtd_p,0)-rets.reduce((a,m)=>a+m.qtd_p,0)
  const usM=saidas.reduce((a,m)=>a+m.qtd_m,0)-rets.reduce((a,m)=>a+m.qtd_m,0)
  const usG=saidas.reduce((a,m)=>a+m.qtd_g,0)-rets.reduce((a,m)=>a+m.qtd_g,0)
  const pb={}
  movimentos.forEach(mv=>{const bar=barracas.find(b=>b.id===mv.barraca_id);const n=bar?bar.nome:'?';if(!pb[n])pb[n]={sp:0,sm:0,sg:0,vp:0,vm:0,vg:0};if(mv.tipo==='saida'){pb[n].sp+=mv.qtd_p;pb[n].sm+=mv.qtd_m;pb[n].sg+=mv.qtd_g}else{pb[n].vp+=mv.qtd_p;pb[n].vm+=mv.qtd_m;pb[n].vg+=mv.qtd_g}})
  const dt=new Date().toLocaleDateString('pt-BR')
  let rows=[]
  rows.push(['RELATÓRIO DE PRENDAS — FESTA JUNINA — COLÉGIO SER'])
  rows.push([`Data de geração: ${dt}`])
  rows.push([])
  rows.push(['RESUMO GERAL'])
  rows.push(['Tipo','Estoque inicial','Utilizadas','Saldo'])
  rows.push(['P',estoqueInicial.p,usP,saldo.p])
  rows.push(['M',estoqueInicial.m,usM,saldo.m])
  rows.push(['G',estoqueInicial.g,usG,saldo.g])
  rows.push([])
  rows.push(['POR BARRACA'])
  rows.push(['Barraca','Saiu P','Saiu M','Saiu G','Voltou P','Voltou M','Voltou G','Usou P','Usou M','Usou G'])
  Object.entries(pb).forEach(([n,v])=>rows.push([n,v.sp,v.sm,v.sg,v.vp,v.vm,v.vg,v.sp-v.vp,v.sm-v.vm,v.sg-v.vg]))
  rows.push([])
  rows.push(['HISTÓRICO COMPLETO'])
  rows.push(['Horário','Tipo','Barraca','Retirado por','Qtd P','Qtd M','Qtd G'])
  ;[...movimentos].forEach(mv=>{
    const bar=barracas.find(b=>b.id===mv.barraca_id)
    const h=mv.created_at?new Date(mv.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):''
    rows.push([h,mv.tipo==='saida'?'Saída':'Retorno',bar?bar.nome:'?',mv.retirado_por||'',mv.qtd_p,mv.qtd_m,mv.qtd_g])
  })
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n')
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'})
  const a=document.createElement('a');a.href=URL.createObjectURL(blob)
  a.download=`prendas-festajunina-${dt.replace(/\//g,'-')}.csv`;a.click()
  toast('CSV exportado!')
}

function exportPDF(){
  const saidas=movimentos.filter(m=>m.tipo==='saida'),rets=movimentos.filter(m=>m.tipo==='retorno')
  const usP=saidas.reduce((a,m)=>a+m.qtd_p,0)-rets.reduce((a,m)=>a+m.qtd_p,0)
  const usM=saidas.reduce((a,m)=>a+m.qtd_m,0)-rets.reduce((a,m)=>a+m.qtd_m,0)
  const usG=saidas.reduce((a,m)=>a+m.qtd_g,0)-rets.reduce((a,m)=>a+m.qtd_g,0)
  const pb={}
  movimentos.forEach(mv=>{const bar=barracas.find(b=>b.id===mv.barraca_id);const n=bar?bar.nome:'?';if(!pb[n])pb[n]={sp:0,sm:0,sg:0,vp:0,vm:0,vg:0};if(mv.tipo==='saida'){pb[n].sp+=mv.qtd_p;pb[n].sm+=mv.qtd_m;pb[n].sg+=mv.qtd_g}else{pb[n].vp+=mv.qtd_p;pb[n].vm+=mv.qtd_m;pb[n].vg+=mv.qtd_g}})
  const dt=new Date().toLocaleDateString('pt-BR')
  const barRows=Object.entries(pb).map(([n,v])=>`<tr><td>${n}</td><td>${v.sp}</td><td>${v.sm}</td><td>${v.sg}</td><td>${v.sp-v.vp}</td><td>${v.sm-v.vm}</td><td>${v.sg-v.vg}</td></tr>`).join('')
  const mvRows=[...movimentos].map(mv=>{
    const bar=barracas.find(b=>b.id===mv.barraca_id)
    const h=mv.created_at?new Date(mv.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):''
    const tipo=mv.tipo==='saida'?'Saída':'Retorno'
    const pts=[mv.qtd_p&&mv.qtd_p+'P',mv.qtd_m&&mv.qtd_m+'M',mv.qtd_g&&mv.qtd_g+'G'].filter(Boolean).join(' ')
    return`<tr><td>${h}</td><td>${tipo}</td><td>${bar?bar.nome:'?'}</td><td>${mv.retirado_por||'—'}</td><td>${pts}</td></tr>`
  }).join('')
  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><title>Relatório Prendas — Festa Junina</title><style>
  *{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:12px;color:#222;padding:20px}
  h1{font-size:18px;color:#1a5fa8;margin-bottom:4px}h2{font-size:13px;color:#1a5fa8;margin:16px 0 6px;border-bottom:1px solid #1a5fa8;padding-bottom:3px}
  .sub{font-size:11px;color:#666;margin-bottom:16px}
  .resumo{display:flex;gap:12px;margin-bottom:8px}
  .box{background:#f1f3f5;border-radius:6px;padding:10px 16px;text-align:center;flex:1}
  .box-val{font-size:22px;font-weight:700}.box-lbl{font-size:10px;color:#666;margin-top:2px}
  table{width:100%;border-collapse:collapse;margin-bottom:8px}
  th{background:#1a5fa8;color:#fff;padding:6px 8px;text-align:left;font-size:11px}
  td{padding:5px 8px;border-bottom:1px solid #e9ecef;font-size:11px}
  tr:nth-child(even) td{background:#f8f9fa}
  .saida{color:#c0392b;font-weight:600}.retorno{color:#2d8a4e;font-weight:600}
  @media print{body{padding:10px}}
  </style></head><body>
  <h1>🎪 Relatório de Prendas — Festa Junina</h1>
  <div class="sub">Colégio SER · Gerado em ${dt}</div>
  <h2>Estoque Inicial × Estoque Final</h2>
  <table><thead><tr><th>Tamanho</th><th>Inicial</th><th>Utilizado</th><th>Saldo Final</th><th>Aproveitamento</th></tr></thead>
  <tbody>
    <tr><td>P — Pequena</td><td>${estoqueInicial.p}</td><td>${usP}</td><td>${saldo.p}</td><td>${estoqueInicial.p?Math.round((usP/estoqueInicial.p)*100):0}%</td></tr>
    <tr><td>M — Média</td><td>${estoqueInicial.m}</td><td>${usM}</td><td>${saldo.m}</td><td>${estoqueInicial.m?Math.round((usM/estoqueInicial.m)*100):0}%</td></tr>
    <tr><td>G — Grande</td><td>${estoqueInicial.g}</td><td>${usG}</td><td>${saldo.g}</td><td>${estoqueInicial.g?Math.round((usG/estoqueInicial.g)*100):0}%</td></tr>
    <tr style="font-weight:700;background:#e8f1fb"><td>TOTAL</td><td>${estoqueInicial.p+estoqueInicial.m+estoqueInicial.g}</td><td>${usP+usM+usG}</td><td>${saldo.p+saldo.m+saldo.g}</td><td>${(estoqueInicial.p+estoqueInicial.m+estoqueInicial.g)?Math.round(((usP+usM+usG)/(estoqueInicial.p+estoqueInicial.m+estoqueInicial.g))*100):0}%</td></tr>
  </tbody></table>
  <h2>Resumo Geral</h2>
  <div class="resumo">
    <div class="box"><div class="box-val" style="color:#1b5e20">${usP}</div><div class="box-lbl">P utilizadas</div></div>
    <div class="box"><div class="box-val" style="color:#6d4c00">${usM}</div><div class="box-lbl">M utilizadas</div></div>
    <div class="box"><div class="box-val" style="color:#7b1a2e">${usG}</div><div class="box-lbl">G utilizadas</div></div>
    <div class="box"><div class="box-val">${saldo.p+saldo.m+saldo.g}</div><div class="box-lbl">Saldo restante</div></div>
  </div>
  <h2>Por Barraca</h2>
  <table><thead><tr><th>Barraca</th><th>Saiu P</th><th>Saiu M</th><th>Saiu G</th><th>Usou P</th><th>Usou M</th><th>Usou G</th></tr></thead><tbody>${barRows}</tbody></table>
  <h2>Histórico Completo</h2>
  <table><thead><tr><th>Horário</th><th>Tipo</th><th>Barraca</th><th>Retirado por</th><th>Quantidades</th></tr></thead><tbody>${mvRows}</tbody></table>
  </body></html>`
  const w=window.open('','_blank')
  w.document.write(html)

async function boot(){
  document.getElementById('app').innerHTML=`
    <div class="shell">
      <header class="header">
        <span class="header-icon">🎪</span>
        <div><div class="header-title">Prendas — Festa Junina</div><div class="header-sub">Colégio SER · Controle de distribuição</div></div>
      </header>
      <main class="content" id="content"><div class="loading"><div class="spinner"></div> Carregando…</div></main>
      <nav class="nav" id="nav">
        ${['inicio','barracas','estoque','saida','retorno','relatorio'].map(t=>`
          <button class="nb${t===tab?' active':''}" data-tab="${t}">${ICONS[t]}<span>${{inicio:'Início',barracas:'Barracas',estoque:'Estoque',saida:'Saída',retorno:'Retorno',relatorio:'Relatório'}[t]}</span></button>
        `).join('')}
      </nav>
    </div>`
  document.getElementById('nav').addEventListener('click',e=>{
    const btn=e.target.closest('[data-tab]')
    if(btn) switchTab(btn.dataset.tab)
  })
  await loadAll()
  renderTab(tab)
  subscribe()
}

async function loadAll(){
  const [b,m,e]=await Promise.all([
    db.from('barracas').select('*').order('created_at'),
    db.from('movimentos').select('*').order('created_at'),
    db.from('estoque').select('*').limit(1).maybeSingle()
  ])
  if(b.error){toast('Erro de conexão: '+b.error.message);return}
  barracas=b.data||[]; movimentos=m.data||[]
  if(e.data){estoqueInicial={p:e.data.p,m:e.data.m,g:e.data.g};estoqueEdit={...estoqueInicial};recalc()}
}

function recalc(){
  saldo={...estoqueInicial}
  movimentos.forEach(mv=>{const s=mv.tipo==='saida'?-1:1;saldo.p+=s*mv.qtd_p;saldo.m+=s*mv.qtd_m;saldo.g+=s*mv.qtd_g})
}

function subscribe(){
  db.channel('all').on('postgres_changes',{event:'*',schema:'public',table:'barracas'},async()=>{const r=await db.from('barracas').select('*').order('created_at');barracas=r.data||[];renderTab(tab)})
  .on('postgres_changes',{event:'*',schema:'public',table:'movimentos'},async()=>{const r=await db.from('movimentos').select('*').order('created_at');movimentos=r.data||[];recalc();renderTab(tab)})
  .on('postgres_changes',{event:'*',schema:'public',table:'estoque'},async()=>{const r=await db.from('estoque').select('*').limit(1).maybeSingle();if(r.data){estoqueInicial={p:r.data.p,m:r.data.m,g:r.data.g};estoqueEdit={...estoqueInicial};recalc()}renderTab(tab)})
  .subscribe()
}

function switchTab(t){
  tab=t
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('active',b.dataset.tab===t))
  renderTab(t)
}

function renderTab(t){
  const fn={inicio:rInicio,barracas:rBarracas,estoque:rEstoque,saida:rSaida,retorno:rRetorno,relatorio:rRelatorio}[t]
  if(!fn)return
  document.getElementById('content').innerHTML=`<div class="section active">${fn()}</div>`
  attachHandlers(t)
}

function qtyInput(pfx,tam,sigla,nome,val){
  return`<div class="qty-row"><div class="qty-label"><span class="badge b${tam}">${sigla}</span>${nome}</div><input class="qty-input" type="number" min="0" inputmode="numeric" pattern="[0-9]*" data-pfx="${pfx}" data-tam="${tam}" value="${val}"/></div>`
}
function qtyBtns(pfx,tam,sigla,nome,val){
  return`<div class="qty-row"><div class="qty-label"><span class="badge b${tam}">${sigla}</span>${nome}</div><div class="qty-ctrl"><button class="qty-btn" data-pfx="${pfx}" data-tam="${tam}" data-d="-1">−</button><span class="qty-val" id="qv-${pfx}-${tam}">${val}</span><button class="qty-btn" data-pfx="${pfx}" data-tam="${tam}" data-d="1">+</button></div></div>`
}

function rInicio(){
  const saidas=movimentos.filter(m=>m.tipo==='saida')
  const dp=saidas.reduce((a,m)=>a+m.qtd_p,0),dm=saidas.reduce((a,m)=>a+m.qtd_m,0),dg=saidas.reduce((a,m)=>a+m.qtd_g,0)
  const rec=[...movimentos].reverse().slice(0,5)
  return`<p class="page-title">Visão geral</p>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${estoqueInicial.p}</div><div class="stat-lbl">Estoque inicial P</div></div>
    <div class="stat-card"><div class="stat-val">${estoqueInicial.m}</div><div class="stat-lbl">Estoque inicial M</div></div>
    <div class="stat-card"><div class="stat-val">${estoqueInicial.g}</div><div class="stat-lbl">Estoque inicial G</div></div>
    <div class="stat-card"><div class="stat-val">${barracas.length}</div><div class="stat-lbl">Barracas</div></div>
  </div>
  <div class="card"><div class="card-title">Distribuído</div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="badge bp">P: ${dp}</span><span class="badge bm">M: ${dm}</span><span class="badge bg">G: ${dg}</span></div></div>
  <div class="card"><div class="card-title">Saldo disponível</div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="badge bp">P: ${saldo.p}</span><span class="badge bm">M: ${saldo.m}</span><span class="badge bg">G: ${saldo.g}</span></div></div>
  <div class="card"><div class="card-title">Movimentações recentes</div>${rec.length?rec.map(mvHTML).join(''):empty('Nenhuma movimentação ainda')}</div>`
}

function rBarracas(){
  return`<p class="page-title">Barracas</p>
  <div class="card">
    <div class="fg"><label>Nome da barraca</label><input id="ib-nome" type="text" placeholder="Ex: Argolas, Pesca, Correio Elegante…"/></div>
    <div class="fg"><label>Responsável</label><input id="ib-resp" type="text" placeholder="Nome de quem retira as prendas"/></div>
    <button class="btn btn-primary btn-block" id="btn-add-b">＋ Cadastrar barraca</button>
  </div>
  <div id="lista-b">${barracas.length?barracas.map(b=>`
    <div class="card" style="margin-bottom:8px">
      <div class="li" style="padding:0">
        <div class="li-main"><div class="li-name">${b.nome}</div>${b.responsavel?`<div class="li-sub">👤 ${b.responsavel}</div>`:''}</div>
        <button class="btn btn-outline btn-sm" data-del="${b.id}">🗑</button>
      </div>
    </div>`).join(''):empty('Nenhuma barraca cadastrada')}</div>`
}

function rEstoque(){
  return`<p class="page-title">Estoque de prendas</p>
  <p class="page-sub">Informe o total de prendas disponíveis.</p>
  <div class="card">
    ${qtyInput('est','p','P','Pequena',estoqueEdit.p)}
    ${qtyInput('est','m','M','Média',estoqueEdit.m)}
    ${qtyInput('est','g','G','Grande',estoqueEdit.g)}
    <div class="divider"></div>
    <button class="btn btn-primary btn-block" id="btn-salvar-est">💾 Salvar estoque inicial</button>
  </div>
  ${(estoqueInicial.p||estoqueInicial.m||estoqueInicial.g)?`<div class="card"><div class="card-title">Saldo atual</div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="badge bp">P: ${saldo.p}</span><span class="badge bm">M: ${saldo.m}</span><span class="badge bg">G: ${saldo.g}</span></div></div>`:''}`
}

function rSaida(){
  return`<p class="page-title">Dar saída de prendas</p>
  <div class="card">
    <div class="fg"><label>Barraca de destino</label><select id="sel-s"><option value="">Selecione a barraca…</option>${barracas.map(b=>`<option value="${b.id}">${b.nome}${b.responsavel?' — '+b.responsavel:''}</option>`).join('')}</select></div>
    <div class="fg"><label>Retirado por</label><input id="inp-por" type="text" placeholder="Nome de quem está retirando"/></div>
    <div class="divider"></div>
    <div class="card-title" style="margin-bottom:6px">Quantidade</div>
    ${qtyInput('saida','p','P','Pequena',saidaTemp.p)}
    ${qtyInput('saida','m','M','Média',saidaTemp.m)}
    ${qtyInput('saida','g','G','Grande',saidaTemp.g)}
    <div class="divider"></div>
    <div class="hbox">Saldo: <strong>P ${saldo.p}</strong> · <strong>M ${saldo.m}</strong> · <strong>G ${saldo.g}</strong></div>
    <button class="btn btn-danger btn-block" id="btn-saida">→ Confirmar saída</button>
  </div>`
}

function rRetorno(){
  return`<p class="page-title">Retorno de prendas</p>
  <p class="page-sub">Registre as prendas que sobraram nas barracas.</p>
  <div class="card">
    <div class="fg"><label>Barraca de origem</label><select id="sel-r"><option value="">Selecione a barraca…</option>${barracas.map(b=>`<option value="${b.id}">${b.nome}${b.responsavel?' — '+b.responsavel:''}</option>`).join('')}</select></div>
    <div class="divider"></div>
    <div class="card-title" style="margin-bottom:6px">Quantidade devolvida</div>
    ${qtyInput('ret','p','P','Pequena',retornoTemp.p)}
    ${qtyInput('ret','m','M','Média',retornoTemp.m)}
    ${qtyInput('ret','g','G','Grande',retornoTemp.g)}
    <div class="divider"></div>
    <button class="btn btn-success btn-block" id="btn-retorno">← Confirmar retorno</button>
  </div>`
}

function rRelatorio(){
  if(!movimentos.length&&!estoqueInicial.p&&!estoqueInicial.m&&!estoqueInicial.g)
    return`<p class="page-title">Relatório geral</p>${empty('Nenhum dado registrado ainda')}`
  const saidas=movimentos.filter(m=>m.tipo==='saida'),rets=movimentos.filter(m=>m.tipo==='retorno')
  const usP=saidas.reduce((a,m)=>a+m.qtd_p,0)-rets.reduce((a,m)=>a+m.qtd_p,0)
  const usM=saidas.reduce((a,m)=>a+m.qtd_m,0)-rets.reduce((a,m)=>a+m.qtd_m,0)
  const usG=saidas.reduce((a,m)=>a+m.qtd_g,0)-rets.reduce((a,m)=>a+m.qtd_g,0)
  const pb={}
  movimentos.forEach(mv=>{const bar=barracas.find(b=>b.id===mv.barraca_id);const n=bar?bar.nome:'?';if(!pb[n])pb[n]={sp:0,sm:0,sg:0,vp:0,vm:0,vg:0};if(mv.tipo==='saida'){pb[n].sp+=mv.qtd_p;pb[n].sm+=mv.qtd_m;pb[n].sg+=mv.qtd_g}else{pb[n].vp+=mv.qtd_p;pb[n].vm+=mv.qtd_m;pb[n].vg+=mv.qtd_g}})
  const pctP=estoqueInicial.p?Math.round((usP/estoqueInicial.p)*100):0
  const pctM=estoqueInicial.m?Math.round((usM/estoqueInicial.m)*100):0
  const pctG=estoqueInicial.g?Math.round((usG/estoqueInicial.g)*100):0
  const totalIni=estoqueInicial.p+estoqueInicial.m+estoqueInicial.g
  const totalUsado=usP+usM+usG
  const totalSaldo=saldo.p+saldo.m+saldo.g
  const pctTotal=totalIni?Math.round((totalUsado/totalIni)*100):0

  return`<p class="page-title">Relatório geral</p>
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="btn btn-outline" style="flex:1;font-size:13px" id="btn-csv">📄 Exportar CSV</button>
    <button class="btn btn-outline" style="flex:1;font-size:13px" id="btn-pdf">🖨️ Exportar PDF</button>
  </div>

  <div class="card">
    <div class="card-title">📊 Estoque inicial × Estoque final</div>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="background:#f1f3f5">
          <th style="padding:7px 8px;text-align:left;font-weight:600;color:#6c757d;font-size:11px">TAMANHO</th>
          <th style="padding:7px 8px;text-align:center;font-weight:600;color:#6c757d;font-size:11px">INICIAL</th>
          <th style="padding:7px 8px;text-align:center;font-weight:600;color:#6c757d;font-size:11px">UTILIZADO</th>
          <th style="padding:7px 8px;text-align:center;font-weight:600;color:#6c757d;font-size:11px">SALDO</th>
          <th style="padding:7px 8px;text-align:center;font-weight:600;color:#6c757d;font-size:11px">%</th>
        </tr>
      </thead>
      <tbody>
        <tr style="border-top:1px solid #e9ecef">
          <td style="padding:8px"><span class="badge bp">P</span></td>
          <td style="padding:8px;text-align:center;font-weight:600">${estoqueInicial.p}</td>
          <td style="padding:8px;text-align:center;color:#c0392b;font-weight:600">${usP}</td>
          <td style="padding:8px;text-align:center;color:#2d8a4e;font-weight:600">${saldo.p}</td>
          <td style="padding:8px;text-align:center"><span style="background:#e8f1fb;color:#1a5fa8;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600">${pctP}%</span></td>
        </tr>
        <tr style="border-top:1px solid #e9ecef;background:#f8f9fa">
          <td style="padding:8px"><span class="badge bm">M</span></td>
          <td style="padding:8px;text-align:center;font-weight:600">${estoqueInicial.m}</td>
          <td style="padding:8px;text-align:center;color:#c0392b;font-weight:600">${usM}</td>
          <td style="padding:8px;text-align:center;color:#2d8a4e;font-weight:600">${saldo.m}</td>
          <td style="padding:8px;text-align:center"><span style="background:#e8f1fb;color:#1a5fa8;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600">${pctM}%</span></td>
        </tr>
        <tr style="border-top:1px solid #e9ecef">
          <td style="padding:8px"><span class="badge bg">G</span></td>
          <td style="padding:8px;text-align:center;font-weight:600">${estoqueInicial.g}</td>
          <td style="padding:8px;text-align:center;color:#c0392b;font-weight:600">${usG}</td>
          <td style="padding:8px;text-align:center;color:#2d8a4e;font-weight:600">${saldo.g}</td>
          <td style="padding:8px;text-align:center"><span style="background:#e8f1fb;color:#1a5fa8;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:600">${pctG}%</span></td>
        </tr>
        <tr style="border-top:2px solid #dee2e6;background:#f1f3f5">
          <td style="padding:8px;font-weight:700;font-size:12px">TOTAL</td>
          <td style="padding:8px;text-align:center;font-weight:700">${totalIni}</td>
          <td style="padding:8px;text-align:center;color:#c0392b;font-weight:700">${totalUsado}</td>
          <td style="padding:8px;text-align:center;color:#2d8a4e;font-weight:700">${totalSaldo}</td>
          <td style="padding:8px;text-align:center"><span style="background:#1a5fa8;color:#fff;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:700">${pctTotal}%</span></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="stats-grid"><div class="stat-card"><div class="stat-val" style="color:#1b5e20">${usP}</div><div class="stat-lbl">P utilizadas</div></div><div class="stat-card"><div class="stat-val" style="color:#6d4c00">${usM}</div><div class="stat-lbl">M utilizadas</div></div></div>
  <div class="stats-grid" style="margin-top:0"><div class="stat-card"><div class="stat-val" style="color:#7b1a2e">${usG}</div><div class="stat-lbl">G utilizadas</div></div><div class="stat-card"><div class="stat-val">${totalSaldo}</div><div class="stat-lbl">Saldo restante</div></div></div>
  <div class="card"><div class="card-title">Por barraca</div>${Object.entries(pb).map(([n,v])=>`<div class="li"><div class="li-main"><div class="li-name">${n}</div><div class="li-sub">Saiu: <span class="badge bp">${v.sp}P</span> <span class="badge bm">${v.sm}M</span> <span class="badge bg">${v.sg}G</span></div></div><div style="text-align:right;font-size:12px;color:var(--gray-600)">Usou: ${v.sp-v.vp}P ${v.sm-v.vm}M ${v.sg-v.vg}G</div></div>`).join('')}</div>
  <div class="card"><div class="card-title">Histórico (${movimentos.length})</div>${[...movimentos].reverse().map(mv=>mvHTML(mv,true)).join('')}</div>`
}

function mvHTML(mv, showDel=false){
  const bar=barracas.find(b=>b.id===mv.barraca_id),n=bar?bar.nome:'?'
  const pts=[mv.qtd_p&&mv.qtd_p+'P',mv.qtd_m&&mv.qtd_m+'M',mv.qtd_g&&mv.qtd_g+'G'].filter(Boolean).join(' · ')
  const h=mv.created_at?new Date(mv.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):''
  const delBtn=showDel?`<button class="btn-del" data-del-mv="${mv.id}">🗑</button>`:''
  return`<div class="mitem"><div class="mtop"><span class="mname">${n}</span><div style="display:flex;align-items:center;gap:6px"><span class="badge ${mv.tipo==='saida'?'bs':'br'}">${mv.tipo==='saida'?'↑ Saída':'↓ Retorno'}</span>${delBtn}</div></div><div class="mdetail"><span>${pts}</span>${mv.retirado_por?`<span>— ${mv.retirado_por}</span>`:''}<span>· ${h}</span></div></div>`
}

async function delMovimento(id){
  if(!confirm('Excluir esta movimentação?')) return
  const{error}=await db.from('movimentos').delete().eq('id',id)
  if(error){toast('Erro ao excluir');return}
  toast('Movimentação excluída!')
}

function empty(msg){return`<div class="empty"><div class="empty-icon">📦</div>${msg}</div>`}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}

function attachHandlers(t){
  // qty inputs
  document.querySelectorAll('.qty-input').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const v=Math.max(0,parseInt(inp.value)||0);inp.value=v
      const {pfx,tam}=inp.dataset
      if(pfx==='est')estoqueEdit[tam]=v
      else if(pfx==='saida')saidaTemp[tam]=v
      else if(pfx==='ret')retornoTemp[tam]=v
    })
  })
  // qty btns (not used now but keeping for future)
  document.querySelectorAll('.qty-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const{pfx,tam,d}=btn.dataset,delta=Number(d)
      let obj=pfx==='est'?estoqueEdit:pfx==='saida'?saidaTemp:retornoTemp
      obj[tam]=Math.max(0,obj[tam]+delta)
      const el=document.getElementById(`qv-${pfx}-${tam}`)
      if(el)el.textContent=obj[tam]
    })
  })
  document.querySelectorAll('[data-del-mv]').forEach(btn=>{
    btn.addEventListener('click',()=>delMovimento(btn.dataset.delMv))
  })
  const btnCsv=document.getElementById('btn-csv')
  const btnPdf=document.getElementById('btn-pdf')
  if(btnCsv) btnCsv.addEventListener('click', exportCSV)
  if(btnPdf) btnPdf.addEventListener('click', exportPDF)
  if(t==='barracas'){
    document.getElementById('btn-add-b').addEventListener('click',addBarraca)
    document.querySelectorAll('[data-del]').forEach(btn=>btn.addEventListener('click',()=>delBarraca(btn.dataset.del)))
  }
  if(t==='estoque')document.getElementById('btn-salvar-est').addEventListener('click',salvarEstoque)
  if(t==='saida')document.getElementById('btn-saida').addEventListener('click',confirmarSaida)
  if(t==='retorno')document.getElementById('btn-retorno').addEventListener('click',confirmarRetorno)
}

async function addBarraca(){
  const nome=document.getElementById('ib-nome').value.trim()
  const responsavel=document.getElementById('ib-resp').value.trim()
  if(!nome){toast('Informe o nome da barraca');return}
  const btn=document.getElementById('btn-add-b');btn.disabled=true;btn.textContent='Salvando…'
  const{error}=await db.from('barracas').insert({nome,responsavel})
  btn.disabled=false;btn.textContent='＋ Cadastrar barraca'
  if(error){toast('Erro: '+error.message);return}
  document.getElementById('ib-nome').value='';document.getElementById('ib-resp').value=''
  toast('Barraca cadastrada!')
}

async function delBarraca(id){
  const{error}=await db.from('barracas').delete().eq('id',id)
  if(error)toast('Erro ao remover');else toast('Barraca removida')
}

async function salvarEstoque(){
  const btn=document.getElementById('btn-salvar-est');btn.disabled=true;btn.textContent='Salvando…'
  const{data:ex}=await db.from('estoque').select('id').limit(1).maybeSingle()
  const payload={p:estoqueEdit.p,m:estoqueEdit.m,g:estoqueEdit.g}
  const{error}=ex?await db.from('estoque').update(payload).eq('id',ex.id):await db.from('estoque').insert(payload)
  btn.disabled=false;btn.textContent='💾 Salvar estoque inicial'
  if(error){toast('Erro: '+error.message);return}
  estoqueInicial={...estoqueEdit};recalc();toast('Estoque salvo!');renderTab('estoque')
}

async function confirmarSaida(){
  const bid=document.getElementById('sel-s').value
  const por=document.getElementById('inp-por').value.trim()
  if(!bid){toast('Selecione a barraca');return}
  const{p,m,g}=saidaTemp
  if(!p&&!m&&!g){toast('Informe ao menos 1 prenda');return}
  if(p>saldo.p||m>saldo.m||g>saldo.g){toast('Quantidade maior que o saldo!');return}
  const btn=document.getElementById('btn-saida');btn.disabled=true;btn.textContent='Registrando…'
  const{error}=await db.from('movimentos').insert({barraca_id:bid,tipo:'saida',qtd_p:p,qtd_m:m,qtd_g:g,retirado_por:por||null})
  btn.disabled=false;btn.textContent='→ Confirmar saída'
  if(error){toast('Erro: '+error.message);return}
  saidaTemp={p:0,m:0,g:0};toast('Saída registrada!')
}

async function confirmarRetorno(){
  const bid=document.getElementById('sel-r').value
  if(!bid){toast('Selecione a barraca');return}
  const{p,m,g}=retornoTemp
  if(!p&&!m&&!g){toast('Informe ao menos 1 prenda');return}
  const btn=document.getElementById('btn-retorno');btn.disabled=true;btn.textContent='Registrando…'
  const{error}=await db.from('movimentos').insert({barraca_id:bid,tipo:'retorno',qtd_p:p,qtd_m:m,qtd_g:g,retirado_por:null})
  btn.disabled=false;btn.textContent='← Confirmar retorno'
  if(error){toast('Erro: '+error.message);return}
  retornoTemp={p:0,m:0,g:0};toast('Retorno registrado!')
}

boot()
</script>
</body>
</html>
